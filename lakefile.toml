name = "hodge-lefschetz"
version = "0.1.0"
keywords = ["math", "algebraic-geometry", "hodge-theory"]
defaultTargets = ["HodgeLefschetz"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "HodgeLefschetz"
globs = ["HodgeLefschetz.Lefschetz11"]
